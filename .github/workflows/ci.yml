name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cysd_erp_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run Ruff Lint check
      run: |
        python -m ruff check .

    - name: Run Migrations
      env:
        DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/cysd_erp_db
        DJANGO_SECRET_KEY: test-key-for-ci-and-testing-environments-that-is-secure
        DJANGO_DEBUG: "True"
      run: |
        python manage.py migrate

    - name: Run Tests
      env:
        DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/cysd_erp_db
        DJANGO_SECRET_KEY: test-key-for-ci-and-testing-environments-that-is-secure
        DJANGO_DEBUG: "True"
      run: |
        python manage.py test
