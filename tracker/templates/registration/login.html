{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ enterprise_name }} - Sign In</title>
  
  <!-- Bootstrap 5.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --cysd-navy:   #0d2b55;
      --cysd-teal:   #0a7e8c;
      --cysd-amber:  #f59e0b;
      --cysd-green:  #16a34a;
      --cysd-red:    #dc2626;
    }

    body {
      background: linear-gradient(135deg, #f0f4f8 0%, #dbeafe 100%);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(13, 43, 85, 0.08);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      max-width: 420px;
      width: 100%;
      padding: 2.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(13, 43, 85, 0.12);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      background: var(--cysd-navy);
      color: #fff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 4px 12px rgba(13, 43, 85, 0.2);
    }

    .brand-title {
      color: var(--cysd-navy);
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }

    .brand-subtitle {
      color: #64748b;
      font-size: 0.85rem;
    }

    .btn-login {
      background: var(--cysd-navy);
      border: none;
      font-weight: 600;
      padding: 0.75rem;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: var(--cysd-teal);
    }

    /* Customize crispy form inputs styling to match */
    .form-control:focus {
      border-color: var(--cysd-teal);
      box-shadow: 0 0 0 0.25rem rgba(10, 126, 140, 0.15);
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="brand-header">
    <div class="brand-logo">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h4 class="brand-title">{{ enterprise_name }}</h4>
    <p class="brand-subtitle">Enterprise Resource Planning</p>
  </div>

  {% if form.errors %}
    <div class="alert alert-danger d-flex align-items-center py-2 px-3 mb-3" role="alert" style="font-size: 0.85rem; border-radius: 8px;">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <div>Your username and password didn't match. Please try again.</div>
    </div>
  {% endif %}

  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    
    {{ form|crispy }}
    
    <input type="hidden" name="next" value="{{ next }}">
    
    <button type="submit" class="btn btn-primary btn-login w-100 mt-3">
      Sign In <i class="bi bi-arrow-right-short ms-1"></i>
    </button>
  </form>
</div>

</body>
</html>
