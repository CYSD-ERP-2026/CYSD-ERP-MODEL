{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error</title>

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --cysd-navy: #0f172a;
      --cysd-slate: #64748b;
      --cysd-primary: #2563eb;
    }

    body {
      background: radial-gradient(circle at top left, rgba(37, 99, 235, .08), transparent 32rem),
                  linear-gradient(180deg, #ffffff 0%, #f8fafc 38%, #eef2f7 100%);
      color: var(--cysd-navy);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .error-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .05), 0 8px 24px rgba(15, 23, 42, .06);
      background: #ffffff;
      max-width: 520px;
      width: 100%;
      padding: 2.5rem;
      text-align: center;
    }

    .error-icon {
      width: 56px;
      height: 56px;
      background: #fef2f2;
      color: #ef4444;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin: 0 auto 1.5rem;
    }

    .error-title {
      font-weight: 700;
      color: var(--cysd-navy);
      margin-bottom: 0.75rem;
    }

    .error-description {
      color: var(--cysd-slate);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .btn-home {
      background-color: var(--cysd-primary);
      border: none;
      font-weight: 600;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="error-card">
  <div class="error-icon">
    <i class="bi bi-exclamation-triangle-fill"></i>
  </div>
  
  <h3 class="error-title">Server Error</h3>
  <p class="error-description">
    An unexpected error occurred within your workspace. Please try again later.
  </p>

  <a href="/dashboard/" class="btn btn-primary btn-home">
    Back to Dashboard
  </a>
</div>

</body>
</html>
